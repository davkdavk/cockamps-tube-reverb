name: Build

permissions:
  contents: write

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxext-dev \
            libfreetype6-dev libasound2-dev libfontconfig1-dev libgl1-mesa-dev
      - name: Clone JUCE
        run: git clone --branch 7.0.9 --depth 1 https://github.com/juce-framework/JUCE.git ../JUCE
      - name: Build
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DJUCE_PATH=$(realpath ../JUCE)
          cmake --build build --parallel
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CockReverb-Linux-VST3
          path: build/**/*.vst3

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Clone JUCE
        run: git clone --branch 7.0.9 --depth 1 https://github.com/juce-framework/JUCE.git ..\JUCE
      - name: Build
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 -DJUCE_PATH="..\JUCE"
          cmake --build build --config Release --parallel
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CockReverb-Windows-VST3
          path: build/**/*.vst3

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: CockReverb-Linux-VST3
          path: artifacts/linux
      - uses: actions/download-artifact@v4
        with:
          name: CockReverb-Windows-VST3
          path: artifacts/windows
      - name: Package artifacts
        run: |
          tar -czf CockReverb-Linux-VST3.tar.gz -C artifacts/linux .
          tar -czf CockReverb-Windows-VST3.tar.gz -C artifacts/windows .
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            CockReverb-Linux-VST3.tar.gz
            CockReverb-Windows-VST3.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
